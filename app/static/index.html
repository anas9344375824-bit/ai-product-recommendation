<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Product Recommendation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header card">
        <div class="header-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M5 7.5A4.5 4.5 0 0 1 9.5 3h.25c1.54 0 2.96.78 3.78 2.07l.25.4h.7a4.5 4.5 0 0 1 0 9h-8.9A4.5 4.5 0 0 1 5 7.5Z"
            />
            <path
              d="M8 16.5h8.5a2.5 2.5 0 0 1 2.5 2.5v1H5v-1a2.5 2.5 0 0 1 2.5-2.5Z"
            />
          </svg>
        </div>
        <div class="header-text">
          <div class="title-row">
            <h1>AI Product Recommendation</h1>
            <span class="title-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path
                  d="M7 6h-2l-1 2v1h2.2l2.2 8.2a2 2 0 0 0 2 1.5h8.2a2 2 0 0 0 2-1.5L21 10H8.3"
                />
                <circle cx="10" cy="20" r="1.5" />
                <circle cx="17" cy="20" r="1.5" />
              </svg>
            </span>
          </div>
          <p>Find the best products tailored to your preferences with AI</p>
        </div>
      </header>

      <section class="dashboard">
        <div class="panel card">
          <div class="panel-title">
            <h2>1. Select Product Preferences</h2>
          </div>

          <div class="field">
            <label for="category">Category</label>
            <div class="select-wrap">
              <select id="category" name="category">
                <option>Smartphones</option>
                <option>Laptops</option>
                <option>Headphones</option>
                <option>Cameras</option>
              </select>
              <span class="select-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" role="img" aria-hidden="true">
                  <path d="M5 7.5l5 5 5-5" />
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <div class="field-row">
              <label for="budget">Budget</label>
              <span class="budget-range">&#8377;10,000 &mdash; &#8377;100,000</span>
            </div>
            <div class="budget">
              <input
                id="budget"
                type="range"
                min="10000"
                max="100000"
                step="1000"
                value="60000"
              />
              <div id="budget-value" class="budget-value"></div>
            </div>
          </div>

          <div class="field">
            <label>Preferred Features</label>
            <div class="tags">
              <button type="button" class="tag is-active">Good Camera</button>
              <button type="button" class="tag">Long Battery</button>
              <button type="button" class="tag">Fast Charging</button>
              <button type="button" class="tag">Gaming Performance</button>
            </div>
          </div>

          <div class="field">
            <label>Preferred Brands</label>
            <div class="chip-input">
              <div class="chips">
                <span class="chip">
                  Samsung
                  <button type="button" class="chip-remove" aria-label="Remove Samsung">
                    &#215;
                  </button>
                </span>
                <span class="chip">
                  Xiaomi
                  <button type="button" class="chip-remove" aria-label="Remove Xiaomi">
                    &#215;
                  </button>
                </span>
                <span class="chip">
                  Apple
                  <button type="button" class="chip-remove" aria-label="Remove Apple">
                    &#215;
                  </button>
                </span>
              </div>
              <input class="chip-entry" type="text" placeholder="Add brand" />
            </div>
          </div>

          <button id="recommend-btn" class="btn-primary" type="button">
            Get Recommendations
          </button>
        </div>

        <div class="panel card">
          <div class="panel-title">
            <h2>2. AI Recommended Products</h2>
          </div>
          <p id="status" class="status" role="status" aria-live="polite"></p>

          <div id="product-list" class="product-list"></div>

          <div class="export">
            <button id="download-btn" class="btn-outline" type="button">
              <span class="download-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" role="img" aria-hidden="true">
                  <path d="M10 2.5v9m0 0l3-3m-3 3l-3-3" />
                  <path d="M4 14.5h12" />
                </svg>
              </span>
              Download CSV
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
